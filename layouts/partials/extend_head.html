{{ if or .Params.math .Site.Params.math }}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
        onload="renderMathInElement(document.body, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false},
        {left: '\\(', right: '\\)', display: false},
        {left: '\\[', right: '\\]', display: true}
      ],
      throwOnError : false
    });"></script>
{{ end }}

{{ if or .Params.mermaid .Site.Params.mermaid.enable }}
<script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: true });
</script>
{{ end }}

<style>
    /* ... (Giữ nguyên phần margin cho h1, h2, h3 cũ của anh) ... */
    .post-content h1,
    .post-content h2,
    .post-content h3,
    .post-content h4 {
        margin-top: 2em !important;
        margin-bottom: 1em !important;
    }

    /* 🛡️ Trấn áp lỗi tràn viền và dư khoảng trắng của Hugo Chroma */
    .highlight pre {
        overflow-x: auto !important; /* Ép hiện thanh cuộn ngang */
        padding: 1.2em !important;   /* Chuẩn hóa lại lề trên/dưới cho vừa vặn */
        margin-top: 1em !important;
        margin-bottom: 1em !important;
    }

    /* 🧨 Tiêu diệt thẻ flex ngầm của Hugo gây lỗi tràn chữ */
    .highlight span[style*="display:flex"],
    .highlight span[style*="display: flex"] {
        display: block !important;
    }
</style>
