{{ if or .Params.math .Site.Params.math }}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
        onload="renderMathInElement(document.body, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false},
        {left: '\\(', right: '\\)', display: false},
        {left: '\\[', right: '\\]', display: true}
      ],
      throwOnError : false
    });"></script>
{{ end }}

{{ if or .Params.mermaid .Site.Params.mermaid.enable }}
<script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: true });
</script>
{{ end }}

<style>
    .post-content h1,
    .post-content h2,
    .post-content h3,
    .post-content h4 {
        margin-top: 1em !important;    /* Đẩy tiêu đề cách xa đoạn văn phía trên */
        margin-bottom: 1em !important; /* Tạo khoảng thở với đoạn văn phía dưới */
    }

    .post-cta {
        margin-top: 3rem;
        padding-top: 1.25rem;
        border-top: 1px solid var(--border);
        color: var(--secondary);
        font-size: 0.95rem;
    }

    .post-cta p {
        margin: 0.35rem 0;
    }

    .post-cta a {
        color: var(--primary);
        box-shadow: 0 1px 0 var(--tertiary);
    }

    .post-cta a:hover {
        box-shadow: 0 1px 0 var(--primary);
    }

    .about-page {
        max-width: 960px;
    }

    .about-page .post-content {
        font-size: 1rem;
        line-height: 1.75;
    }

    .about-hero {
        padding: 4.5rem 0 2.25rem;
        border-bottom: 1px solid var(--border);
    }

    .about-kicker {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        margin: 0 0 0.75rem;
        color: var(--secondary);
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
    }

    .about-kicker span {
        font-size: 1.05rem;
        letter-spacing: 0;
    }

    .about-hero h1 {
        margin: 0;
        font-size: 3rem;
        line-height: 1.08;
    }

    .about-lede {
        max-width: 760px;
        margin: 1.25rem 0 0;
        color: var(--content);
        font-size: 1.18rem;
    }

    .about-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-top: 1.75rem;
    }

    .about-actions a,
    .about-principles span {
        display: inline-flex;
        align-items: center;
        min-height: 2.35rem;
        padding: 0.35rem 0.85rem;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--entry);
        color: var(--primary);
        box-shadow: none;
        font-size: 0.95rem;
        font-weight: 600;
    }

    .about-actions a:hover {
        border-color: var(--secondary);
    }

    .about-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 1rem;
        margin: 2rem 0;
    }

    .about-grid article {
        padding: 1.15rem;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--entry);
    }

    .about-grid h2,
    .about-body h2 {
        display: flex;
        align-items: center;
        gap: 0.55rem;
        margin: 0 0 0.6rem !important;
        font-size: 1.05rem;
        line-height: 1.3;
    }

    .about-grid h2 span {
        flex: none;
        font-size: 1.05rem;
        line-height: 1;
    }

    .about-grid p,
    .about-body p {
        margin: 0;
        color: var(--secondary);
        font-size: 0.98rem;
    }

    .about-body {
        max-width: 760px;
        margin-top: 2.25rem;
    }

    .about-body p + p {
        margin-top: 1rem;
    }

    .about-principles {
        display: flex;
        flex-wrap: wrap;
        gap: 0.7rem;
        margin-top: 2rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border);
    }

    @media (max-width: 768px) {
        .about-hero {
            padding-top: 2.5rem;
        }

        .about-hero h1 {
            font-size: 2.25rem;
        }

        .about-lede {
            font-size: 1.05rem;
        }

        .about-grid {
            grid-template-columns: 1fr;
        }
    }
</style>
