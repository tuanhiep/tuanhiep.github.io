{{ if or .Params.math .Site.Params.math }}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
        onload="renderMathInElement(document.body, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false},
        {left: '\\(', right: '\\)', display: false},
        {left: '\\[', right: '\\]', display: true}
      ],
      throwOnError : false
    });"></script>
{{ end }}

{{ if or .Params.mermaid .Site.Params.mermaid.enable }}
<script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: true });
</script>
{{ end }}

<style>
    .post-content h1,
    .post-content h2,
    .post-content h3,
    .post-content h4 {
        margin-top: 1em !important;    /* Đẩy tiêu đề cách xa đoạn văn phía trên */
        margin-bottom: 1em !important; /* Tạo khoảng thở với đoạn văn phía dưới */
    }

    .post-cta {
        margin-top: 3rem;
        padding-top: 1.25rem;
        border-top: 1px solid var(--border);
        color: var(--secondary);
        font-size: 0.95rem;
    }

    .post-cta p {
        margin: 0.35rem 0;
    }

    .post-cta a {
        color: var(--primary);
        box-shadow: 0 1px 0 var(--tertiary);
    }

    .post-cta a:hover {
        box-shadow: 0 1px 0 var(--primary);
    }
</style>
