baseURL: "https://tuanhiep.github.io/"
title: "Tuan Hiep TRAN — System Design & AI Infra"
languageCode: "en-us"
theme: "PaperMod"

# 1. THÊM ĐOẠN NÀY ĐỂ KÍCH HOẠT SERIES
taxonomies:
  category: categories
  tag: tags
  series: series

pagination:
  pagerSize: 10
enableRobotsTXT: true
enableGitInfo: true

frontmatter:
  date:
    - date
    - publishDate
    - :git   # fallback → dùng ngày commit đầu tiên
  lastmod:
    - lastmod
    - date
    - publishDate
    - :git        # <- ưu tiên ngày commit

params:
  defaultTheme: auto
  showReadingTime: true
  showToc: true
  tocOpen: true
  author: "Hiep"
  homeInfoParams:
    Title: "System Design & AI Infra"
    Content: >
      Notes from real-world Distributed Systems and AI Infrastructure.
  showLastMod: true              # <- bật hiển thị ngày update
  # lastModFormat: "Jan 2, 2006" # (tuỳ chọn format ngày)
  mermaid:
    enable: true
    theme: "default" # Các lựa chọn: default, dark, neutral, forest

menu:
  main:
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 1
    # 2. THÊM MENU NÀY VÀO TRANG CHỦ
    - identifier: series
      name: Series
      url: /series/
      weight: 2
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 3

markup:
  highlight:
    noClasses: false
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        enable: true
        delimiters:
          block:
            - - $$
              - $$
            - - \[
              - \]
          inline:
            - - $
              - $
            - - \(
              - \)
