baseURL: "https://tuanhiep.github.io/"
title: "Tuan Hiep TRAN — System Design & AI Infra"
languageCode: "en-us"
theme: "PaperMod"
googleAnalytics: "G-P0Y0LZDWZS"

# 1. THÊM ĐOẠN NÀY ĐỂ KÍCH HOẠT SERIES
taxonomies:
  category: categories
  tag: tags
  series: series

pagination:
  pagerSize: 10
enableRobotsTXT: true
enableGitInfo: true

frontmatter:
  date:
    - date
    - publishDate
    - :git   # fallback → dùng ngày commit đầu tiên
  lastmod:
    - lastmod
    - date
    - publishDate
    - :git        # <- ưu tiên ngày commit

params:
  env: production
  defaultTheme: auto
  showReadingTime: true
  showToc: true
  tocOpen: true
  author: "Hiep"
  socialIcons:
    - name: linkedin
      title: LinkedIn
      url: "https://www.linkedin.com/in/tuan-hiep-tran/"
    - name: github
      title: GitHub
      url: "https://github.com/tuanhiep"
    - name: rss
      title: RSS
      url: "/posts/index.xml"
  homeInfoParams:
    Title: "System Design & AI Infra"
    Content: >
      Notes from real-world Distributed Systems and AI Infrastructure.
  showLastMod: true              # <- bật hiển thị ngày update
  footer:
    text: 'Connect: [LinkedIn](https://www.linkedin.com/in/tuan-hiep-tran/) / [GitHub](https://github.com/tuanhiep) / [RSS](/posts/index.xml)'
  analytics:
    google:
      SiteVerificationTag: "p0E9Md4M8vdZsufpDXcbZrV0pgtWlIEvy9vy0XYvl0w"
  # lastModFormat: "Jan 2, 2006" # (tuỳ chọn format ngày)
  mermaid:
    enable: true
    theme: "default" # Các lựa chọn: default, dark, neutral, forest

menu:
  main:
    - identifier: about
      name: About
      url: /about/
      weight: 1
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 2
    # 2. THÊM MENU NÀY VÀO TRANG CHỦ
    - identifier: series
      name: Series
      url: /series/
      weight: 3
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 4
    - identifier: linkedin
      name: LinkedIn
      url: "https://www.linkedin.com/in/tuan-hiep-tran/"
      weight: 5
    - identifier: github
      name: GitHub
      url: "https://github.com/tuanhiep"
      weight: 6
    - identifier: rss
      name: RSS
      url: /posts/index.xml
      weight: 7

markup:
  highlight:
    noClasses: false
    lineNos: false
    lineNumbersInTable: false
    anchorLineNos: false
    codeFences: true
    guessSyntax: true
    hl_Lines: ""
    hl_inline: false
    style: "monokai"
    tabWidth: 4
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        enable: true
        delimiters:
          block:
            - - $$
              - $$
            - - \[
              - \]
          inline:
            - - $
              - $
            - - \(
              - \)
